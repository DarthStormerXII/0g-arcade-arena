name: Game Pack CI

on:
  pull_request:
    paths:
      - "games/**"
      - "src/lib/game-pack.ts"
      - "scripts/game-tool.mjs"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm game:validate
      - run: pnpm test
